name: Test PyTorch

# see: https://help.github.com/en/actions/reference/events-that-trigger-workflows
on:
  push:
    branches: [master, "release/*"]
  pull_request:
    branches: [master, "release/*"]
    types: [opened, reopened, ready_for_review, synchronize] # added `ready_for_review` since draft is skipped
    paths:
      - ".actions/*"
      - "requirements/ci.txt"
      - "requirements/pytorch/**"
      - "src/lightning/pytorch/**"
      - "src/pytorch_lightning/*"
      - "tests/tests_pytorch/**"
      - "tests/legacy/**"
      - "pyproject.toml" # includes pytest config
      - ".github/workflows/ci-tests-pytorch.yml"
      - "requirements/fabric/**"
      - "src/lightning/fabric/**"
      - "src/lightning_fabric/*"
      - "!requirements/pytorch/docs.txt"
      - "!*.md"
      - "!**/*.md"
  schedule:
    # At the end of every day
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  pl-cpu:
    runs-on: [self-hosted, tesla]
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        config:
          - { pkg-name: "pytorch", python-version: "3.12.7", pytorch-version: "2.6" }
    timeout-minutes: 50
    env:
      PACKAGE_NAME: ${{ matrix.config.pkg-name }}
      TORCH_URL: "https://download.pytorch.org/whl/cpu/"
      TORCH_URL_STABLE: "https://download.pytorch.org/whl/cpu/"
      TORCH_URL_TEST: "https://download.pytorch.org/whl/test/cpu/"
      FREEZE_REQUIREMENTS: ${{ ! (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')) }}
      # TODO: Remove this - Enable running MPS tests on this platform
      DISABLE_MPS: ${{ matrix.os == 'macOS-14' && '1' || '0' }}
      UV_TORCH_BACKEND: "cpu"
    steps:
      - uses: actions/checkout@v6

      # --- MEDIÇÃO: baseline de 120s de repouso ---
      - name: "[RAPL] Baseline (120s repouso)"
        run: |
          cat /sys/class/powercap/intel-rapl:0/energy_uj   > /tmp/rapl_baseline_start_pkg.txt
          cat /sys/class/powercap/intel-rapl:0:0/energy_uj > /tmp/rapl_baseline_start_cores.txt
          cat /sys/class/powercap/intel-rapl:0:1/energy_uj > /tmp/rapl_baseline_start_gpu.txt
          cat /sys/class/powercap/intel-rapl:0:2/energy_uj > /tmp/rapl_baseline_start_ram.txt
          sleep 120
          cat /sys/class/powercap/intel-rapl:0/energy_uj   > /tmp/rapl_baseline_end_pkg.txt
          cat /sys/class/powercap/intel-rapl:0:0/energy_uj > /tmp/rapl_baseline_end_cores.txt
          cat /sys/class/powercap/intel-rapl:0:1/energy_uj > /tmp/rapl_baseline_end_gpu.txt
          cat /sys/class/powercap/intel-rapl:0:2/energy_uj > /tmp/rapl_baseline_end_ram.txt

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.config.python-version || '3.10' }}
          # TODO: Avoid activating environment like this
          # see: https://github.com/astral-sh/setup-uv/tree/v6/?tab=readme-ov-file#activate-environment
          activate-environment: true
          enable-cache: true

      - name: Basic setup
        run: uv pip install -q -r .actions/requirements.txt

      - name: Append Env. vars for Linux
        if: ${{ runner.os == 'Linux' }}
        run: echo "GLOO_SOCKET_IFNAME=eth0" >> $GITHUB_ENV

      - name: Append Env. vars for MacOS
        if: ${{ runner.os == 'macOS' }}
        run: echo "GLOO_SOCKET_IFNAME=lo0" >> $GITHUB_ENV

      - name: Set min. dependencies
        if: ${{ matrix.config.requires == 'oldest' }}
        run: |
          uv pip install -U "lightning-utilities[cli]"
          python -m lightning_utilities.cli requirements set-oldest \
            --req_files "['requirements/pytorch/base.txt', 'requirements/pytorch/extra.txt', 'requirements/pytorch/strategies.txt', 'requirements/pytorch/examples.txt', 'requirements/pytorch/test.txt']"
          uv pip install "cython<3.0" wheel
          uv pip install "pyyaml==6.0.0" --no-build-isolation
          # This script removes any line containing "error::FutureWarning" from pyproject.toml
          uv pip install -r requirements/ci.txt
          python .actions/assistant.py prune_pytest_as_errors

      - name: Adjust PyTorch versions in requirements files
        if: ${{ matrix.config.requires != 'oldest' }}
        run: |
          uv pip install -q -r requirements/ci.txt
          python -m wget https://raw.githubusercontent.com/Lightning-AI/utilities/main/scripts/adjust-torch-versions.py
          for fpath in `ls requirements/**/*.txt`; do \
            python ./adjust-torch-versions.py $fpath ${{ matrix.config.pytorch-version }}; \
          done
          cat requirements/pytorch/base.txt

      - name: Env. variables
        run: |
          # Switch PyTorch URL between stable and test/future
          python -c "print('TORCH_URL=' + str('${{env.TORCH_URL_TEST}}' if '${{ matrix.config.pytorch-version }}' == '2.7' else '${{env.TORCH_URL_STABLE}}'))" >> $GITHUB_ENV
          # Switch coverage scope
          python -c "print('COVERAGE_SCOPE=' + str('lightning' if '${{matrix.config.pkg-name}}' == 'lightning' else 'pytorch_lightning'))" >> $GITHUB_ENV
          # if you install mono-package set dependency only for this subpackage
          python -c "print('EXTRA_PREFIX=' + str('' if '${{matrix.config.pkg-name}}' != 'lightning' else 'pytorch-'))" >> $GITHUB_ENV
          # Avoid issue on Windows with PyTorch 2.4: "RuntimeError: use_libuv was requested but PyTorch was build without libuv support"
          python -c "print('USE_LIBUV=0' if '${{matrix.os}}' == 'windows-2022' and '${{matrix.config.pytorch-version}}' == '2.4' else '')" >> $GITHUB_ENV

      # --- MEDIÇÃO: leitura RAPL início BUILD ---
      - name: "[RAPL] Início BUILD"
        run: |
          cat /sys/class/powercap/intel-rapl:0/energy_uj   > /tmp/rapl_build_start_pkg.txt
          cat /sys/class/powercap/intel-rapl:0:0/energy_uj > /tmp/rapl_build_start_cores.txt
          cat /sys/class/powercap/intel-rapl:0:1/energy_uj > /tmp/rapl_build_start_gpu.txt
          cat /sys/class/powercap/intel-rapl:0:2/energy_uj > /tmp/rapl_build_start_ram.txt
          date +%s%N > /tmp/rapl_build_start_time.txt

      - name: Install package & dependencies
        timeout-minutes: 20
        run: |
          uv pip install ".[${EXTRA_PREFIX}extra,${EXTRA_PREFIX}test,${EXTRA_PREFIX}strategies]" \
            --upgrade \
            --find-links="${TORCH_URL}"
          # ensure pkg_resources is available for older python versions & packages like onnxruntime that require it
          uv pip install "setuptools<80.10.3"
          uv pip list

      # --- MEDIÇÃO: leitura RAPL fim BUILD ---
      - name: "[RAPL] Fim BUILD"
        run: |
          cat /sys/class/powercap/intel-rapl:0/energy_uj   > /tmp/rapl_build_end_pkg.txt
          cat /sys/class/powercap/intel-rapl:0:0/energy_uj > /tmp/rapl_build_end_cores.txt
          cat /sys/class/powercap/intel-rapl:0:1/energy_uj > /tmp/rapl_build_end_gpu.txt
          cat /sys/class/powercap/intel-rapl:0:2/energy_uj > /tmp/rapl_build_end_ram.txt
          date +%s%N > /tmp/rapl_build_end_time.txt

      - name: Drop LAI from extensions
        if: ${{ matrix.config.pkg-name != 'lightning' }}
        # Lightning is dependency of Habana or other accelerators/integrations so in case we test PL we need to remove it
        run: uv pip uninstall lightning

      - name: Drop PL for LAI
        if: ${{ matrix.config.pkg-name == 'lightning' }}
        run: uv pip uninstall pytorch-lightning

      - name: Cache datasets
        uses: actions/cache@v5
        with:
          path: Datasets
          key: pl-dataset

      - name: Sanity check
        run: |
          set -e
          python requirements/pytorch/check-avail-extras.py
          python -c "from torch import __version__ as ver; assert ver.startswith('${{ matrix.config.pytorch-version }}'), ver"

      - name: Adjust tests / env. -> PL
        if: ${{ matrix.config.pkg-name != 'lightning' }}
        run: |
          python .actions/assistant.py copy_replace_imports --source_dir="./tests" \
            --source_import="lightning.fabric,lightning.pytorch" \
            --target_import="lightning_fabric,pytorch_lightning"

      - name: Prevent using raw source
        run: rm -rf src/

      - name: Get legacy checkpoints
        run: |
          bash .actions/pull_legacy_checkpoints.sh
          cd tests/legacy
          bash generate_checkpoints.sh
          ls -l checkpoints/

      # --- MEDIÇÃO: leitura RAPL início TEST ---
      - name: "[RAPL] Início TEST"
        run: |
          cat /sys/class/powercap/intel-rapl:0/energy_uj   > /tmp/rapl_test_start_pkg.txt
          cat /sys/class/powercap/intel-rapl:0:0/energy_uj > /tmp/rapl_test_start_cores.txt
          cat /sys/class/powercap/intel-rapl:0:1/energy_uj > /tmp/rapl_test_start_gpu.txt
          cat /sys/class/powercap/intel-rapl:0:2/energy_uj > /tmp/rapl_test_start_ram.txt
          date +%s%N > /tmp/rapl_test_start_time.txt

      - name: Testing Warnings
        working-directory: tests/tests_pytorch
        # needs to run outside `pytest`
        run: python utilities/test_warnings.py

      - name: Testing PyTorch
        working-directory: tests/tests_pytorch
        # NOTE: do not include coverage report here, see: https://github.com/nedbat/coveragepy/issues/1003
        run: |
          echo $GITHUB_RUN_ID
          python -m coverage run --source ${{ env.COVERAGE_SCOPE }} \
            -m pytest . -v --timeout=90 --durations=50 --random-order-seed=$GITHUB_RUN_ID \
            --junitxml=junit.xml -o junit_family=legacy  # NOTE: for Codecov's test results

      # --- MEDIÇÃO: leitura RAPL fim TEST ---
      - name: "[RAPL] Fim TEST"
        run: |
          cat /sys/class/powercap/intel-rapl:0/energy_uj   > /tmp/rapl_test_end_pkg.txt
          cat /sys/class/powercap/intel-rapl:0:0/energy_uj > /tmp/rapl_test_end_cores.txt
          cat /sys/class/powercap/intel-rapl:0:1/energy_uj > /tmp/rapl_test_end_gpu.txt
          cat /sys/class/powercap/intel-rapl:0:2/energy_uj > /tmp/rapl_test_end_ram.txt
          date +%s%N > /tmp/rapl_test_end_time.txt

      - name: Statistics
        if: success()
        working-directory: tests/tests_pytorch
        run: |
          coverage report
          coverage xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }} # Run even if tests fail
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        # see: https://github.com/actions/toolkit/issues/399
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: tests/tests_pytorch/coverage.xml
          flags: ${{ env.COVERAGE_SCOPE }},cpu,pytest-full,python${{ matrix.config.python-version }},pytorch${{ matrix.config.pytorch-version }}
          name: CPU-coverage
          fail_ci_if_error: false

      # --- MEDIÇÃO: leitura RAPL início TRAIN ---
      - name: "[RAPL] Início TRAIN"
        run: |
          cat /sys/class/powercap/intel-rapl:0/energy_uj   > /tmp/rapl_train_start_pkg.txt
          cat /sys/class/powercap/intel-rapl:0:0/energy_uj > /tmp/rapl_train_start_cores.txt
          cat /sys/class/powercap/intel-rapl:0:1/energy_uj > /tmp/rapl_train_start_gpu.txt
          cat /sys/class/powercap/intel-rapl:0:2/energy_uj > /tmp/rapl_train_start_ram.txt
          date +%s%N > /tmp/rapl_train_start_time.txt

      - name: "Train standalone"
        run: |
          cd ${{ github.workspace }}
          PYTHONPATH=${{ github.workspace }}/tests \
            python tests/legacy/simple_classif_training.py

      # --- MEDIÇÃO: leitura RAPL fim TRAIN ---
      - name: "[RAPL] Fim TRAIN"
        run: |
          cat /sys/class/powercap/intel-rapl:0/energy_uj   > /tmp/rapl_train_end_pkg.txt
          cat /sys/class/powercap/intel-rapl:0:0/energy_uj > /tmp/rapl_train_end_cores.txt
          cat /sys/class/powercap/intel-rapl:0:1/energy_uj > /tmp/rapl_train_end_gpu.txt
          cat /sys/class/powercap/intel-rapl:0:2/energy_uj > /tmp/rapl_train_end_ram.txt
          date +%s%N > /tmp/rapl_train_end_time.txt

      # --- MEDIÇÃO: calcular e salvar CSV ---
      - name: "[RAPL] Calcular e salvar resultados"
        if: always()
        run: |
          RESULTS_DIR="$HOME/experimentos/medicao/resultados/pytorch-lightning/runs"
          mkdir -p "$RESULTS_DIR"
          CSV="$RESULTS_DIR/run_$(printf '%02d' ${{ github.run_number }}).csv"

          rv() { cat "$1" 2>/dev/null | tr -d '[:space:]' || echo 0; }
          dj() { local s=$1 e=$2; [ "$e" -lt "$s" ] && echo $((262143000000 - s + e)) || echo $((e - s)); }

          bl_d_pkg=$(dj   "$(rv /tmp/rapl_baseline_start_pkg.txt)"   "$(rv /tmp/rapl_baseline_end_pkg.txt)")
          bl_d_cores=$(dj "$(rv /tmp/rapl_baseline_start_cores.txt)" "$(rv /tmp/rapl_baseline_end_cores.txt)")
          bl_d_gpu=$(dj   "$(rv /tmp/rapl_baseline_start_gpu.txt)"   "$(rv /tmp/rapl_baseline_end_gpu.txt)")
          bl_d_ram=$(dj   "$(rv /tmp/rapl_baseline_start_ram.txt)"   "$(rv /tmp/rapl_baseline_end_ram.txt)")
          bl_r_pkg=$(awk   "BEGIN { printf \"%.4f\", $bl_d_pkg   / 120 }")
          bl_r_cores=$(awk "BEGIN { printf \"%.4f\", $bl_d_cores / 120 }")
          bl_r_gpu=$(awk   "BEGIN { printf \"%.4f\", $bl_d_gpu   / 120 }")
          bl_r_ram=$(awk   "BEGIN { printf \"%.4f\", $bl_d_ram   / 120 }")

          echo "run,stage,energy_pkg_j,energy_cores_j,energy_gpu_j,energy_ram_j,wall_time_s,user_time_s,sys_time_s" > "$CSV"

          for stage in build test train; do
            d_pkg=$(dj   "$(rv /tmp/rapl_${stage}_start_pkg.txt)"   "$(rv /tmp/rapl_${stage}_end_pkg.txt)")
            d_cores=$(dj "$(rv /tmp/rapl_${stage}_start_cores.txt)" "$(rv /tmp/rapl_${stage}_end_cores.txt)")
            d_gpu=$(dj   "$(rv /tmp/rapl_${stage}_start_gpu.txt)"   "$(rv /tmp/rapl_${stage}_end_gpu.txt)")
            d_ram=$(dj   "$(rv /tmp/rapl_${stage}_start_ram.txt)"   "$(rv /tmp/rapl_${stage}_end_ram.txt)")
            s_t=$(rv "/tmp/rapl_${stage}_start_time.txt")
            e_t=$(rv "/tmp/rapl_${stage}_end_time.txt")
            wall=$(awk "BEGIN { printf \"%.3f\", ($e_t - $s_t) / 1e9 }")

            j_pkg=$(awk   "BEGIN { v=($d_pkg   - $bl_r_pkg   * $wall)/1e6; printf \"%.6f\", (v>0)?v:0 }")
            j_cores=$(awk "BEGIN { v=($d_cores - $bl_r_cores * $wall)/1e6; printf \"%.6f\", (v>0)?v:0 }")
            j_gpu=$(awk   "BEGIN { v=($d_gpu   - $bl_r_gpu   * $wall)/1e6; printf \"%.6f\", (v>0)?v:0 }")
            j_ram=$(awk   "BEGIN { v=($d_ram   - $bl_r_ram   * $wall)/1e6; printf \"%.6f\", (v>0)?v:0 }")

            echo "${{ github.run_number }},${stage},${j_pkg},${j_cores},${j_gpu},${j_ram},${wall},0,0" >> "$CSV"
          done

          echo "CSV → $CSV"
          cat "$CSV"

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            printf '\n## Run ${{ github.run_number }} — pytorch-lightning\n\n' >> "$GITHUB_STEP_SUMMARY"
            printf '| Etapa | pkg (J) | cores (J) | gpu (J) | ram (J) | wall (s) |\n' >> "$GITHUB_STEP_SUMMARY"
            printf '|---|---|---|---|---|---|\n' >> "$GITHUB_STEP_SUMMARY"
            tail -n +2 "$CSV" | while IFS=, read -r run stage pkg cores gpu ram wall _; do
              printf '| %s | %s | %s | %s | %s | %s |\n' \
                "$stage" "$pkg" "$cores" "$gpu" "$ram" "$wall" >> "$GITHUB_STEP_SUMMARY"
            done
          fi

      - name: Upload resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-pytorch-lightning-${{ github.run_number }}
          path: ~/experimentos/medicao/resultados/pytorch-lightning/
          retention-days: 90

      - name: Minimize uv cache
        run: uv cache prune --ci

      - name: Fix workspace permissions
        if: always()
        run: sudo chown -R "$USER" "${{ github.workspace }}"

  pl-cpu-guardian:
    runs-on: ubuntu-latest
    needs: pl-cpu
    if: always()
    steps:
      - run: echo "${{ needs.pl-cpu.result }}"
      - name: failing...
        if: needs.pl-cpu.result == 'failure'
        run: exit 1
      - name: cancelled or skipped...
        if: contains(fromJSON('["cancelled", "skipped"]'), needs.pl-cpu.result)
        timeout-minutes: 1
        run: sleep 90
